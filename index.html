<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Artisan Cakeshop | Premium Desserts</title>
    <meta name="description" content="Discover our collection of luxurious, handcrafted cakes. Order premium desserts online.">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>The Artisan Cakeshop</h1>
        <p>Handcrafted with passion, using only the finest ingredients. Indulge in our exquisite collection of premium cakes.</p>
        <button id="globalCartBtn" class="btn-global-cart" aria-label="View Cart">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
            <span id="cartCount" class="cart-count">0</span>
        </button>
    </header>

    <main class="container">
        <div class="product-grid" id="productGrid">
            <!-- Products will be generated here by JavaScript -->
        </div>
    </main>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div class="modal-body">
                <img id="modalImage" src="" alt="Product Image">
                <div class="modal-details">
                    <h2 id="modalTitle">Product Title</h2>
                    <p id="modalPrice" class="product-price">$0.00</p>
                    <p id="modalDescription">Description goes here.</p>
                    <button id="modalAddToCart" class="btn-add">
                        <span>Add to Cart</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div id="cartDrawer" class="cart-drawer">
        <div class="cart-drawer-header">
            <h2>Your Cart</h2>
            <button id="closeCartBtn" class="close-btn">&times;</button>
        </div>
        <div id="cartItemsContainer" class="cart-items">
            <!-- Items injected via JS -->
            <p class="empty-cart-msg">Your cart is empty.</p>
        </div>
        <div class="cart-drawer-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotalAmount">$0.00</span>
            </div>
            <button class="btn-checkout">Checkout</button>
        </div>
    </div>
    <div id="cartOverlay" class="cart-overlay"></div>

    <script>
        let cart = [];

        function updateCart() {
            const container = document.getElementById('cartItemsContainer');
            const countBadge = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotalAmount');
            
            countBadge.innerText = cart.length;
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="empty-cart-msg">Your cart is empty.</p>';
                totalEl.innerText = '$0.00';
                return;
            }
            
            let total = 0;
            container.innerHTML = '';
            
            cart.forEach((item, index) => {
                total += item.price;
                const itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.innerHTML = `
                    <img src="${item.imageSrc}" alt="${item.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">$${item.price.toFixed(2)}</div>
                    </div>
                    <button class="remove-item-btn" onclick="removeFromCart(${index})">Remove</button>
                `;
                container.appendChild(itemEl);
            });
            
            totalEl.innerText = '$' + total.toFixed(2);
        }

        window.removeFromCart = function(index) {
            cart.splice(index, 1);
            updateCart();
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Cart drawer handlers
            document.getElementById('globalCartBtn').addEventListener('click', () => {
                document.getElementById('cartDrawer').classList.add('open');
                document.getElementById('cartOverlay').classList.add('open');
            });
            document.getElementById('closeCartBtn').addEventListener('click', () => {
                document.getElementById('cartDrawer').classList.remove('open');
                document.getElementById('cartOverlay').classList.remove('open');
            });
            document.getElementById('cartOverlay').addEventListener('click', () => {
                document.getElementById('cartDrawer').classList.remove('open');
                document.getElementById('cartOverlay').classList.remove('open');
            });

            // Modal close handlers
            document.getElementById('closeModal').addEventListener('click', () => {
                document.getElementById('productModal').style.display = 'none';
            });
            window.addEventListener('click', (e) => {
                if (e.target === document.getElementById('productModal')) {
                    document.getElementById('productModal').style.display = 'none';
                }
            });

            fetch('menu-items.csv')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(csvText => {
                    const lines = csvText.split('\n').filter(line => line.trim() !== '');
                    const grid = document.getElementById('productGrid');
                    grid.innerHTML = ''; // Clear loading state or static items
                    
                    // Skip header (line 0)
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i];
                        // Basic CSV split, assuming no commas inside values
                        const [name, priceStr, quantity, size] = line.split(',');
                        if (!name) continue;
                        
                        const price = parseFloat(priceStr).toFixed(2);
                        
                        // Generate a clean image filename from the product name
                        const imageName = name.trim().toLowerCase().replace(/ /g, '_').replace(/'/g, '') + '.png';
                        const fallbackImage = 'images/vanilla_bean_cake.png';
                        const imageSrc = `images/${imageName}`;
                        const description = `Premium handcrafted ${name.trim().toLowerCase()} made with the finest ingredients.`;
                        
                        const article = document.createElement('article');
                        article.className = 'product-card';
                        article.innerHTML = `
                            <div class="product-image-wrapper">
                                <img src="${imageSrc}" alt="${name.trim()}" class="product-image" loading="lazy" onerror="this.src='${fallbackImage}'">
                            </div>
                            <div class="product-info">
                                <h2 class="product-title">${name.trim()}</h2>
                                <p class="product-description">${description}</p>
                            </div>
                            <div class="product-footer">
                                <span class="product-price">$${price}</span>
                                <button class="btn-add add-to-cart-btn" aria-label="Add ${name.trim()} to cart">
                                    <span>Add to Cart</span>
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M11 9h2V6h3V4h-3V1h-2v3H8v2h3v3zm-4 9c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zm-8.9-5h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.37-.66-.11-1.48-.87-1.48H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7l1.1-2z"/>
                                    </svg>
                                </button>
                            </div>
                        `;

                        // Add to cart functionality
                        const addBtn = article.querySelector('.add-to-cart-btn');
                        addBtn.addEventListener('click', (e) => {
                            e.stopPropagation(); // prevent modal from opening
                            cart.push({ name: name.trim(), price: parseFloat(price), imageSrc: imageSrc });
                            updateCart();
                        });

                        // Open modal functionality
                        article.addEventListener('click', () => {
                            document.getElementById('modalImage').src = imageSrc;
                            document.getElementById('modalImage').onerror = function() { this.src = fallbackImage; };
                            document.getElementById('modalTitle').innerText = name.trim();
                            document.getElementById('modalPrice').innerText = `$${price}`;
                            document.getElementById('modalDescription').innerText = description;
                            
                            const modalBtn = document.getElementById('modalAddToCart');
                            modalBtn.onclick = () => {
                                cart.push({ name: name.trim(), price: parseFloat(price), imageSrc: imageSrc });
                                updateCart();
                            };

                            document.getElementById('productModal').style.display = 'flex';
                        });

                        grid.appendChild(article);
                    }
                })
                .catch(error => {
                    console.error('Error loading menu items:', error);
                    document.getElementById('productGrid').innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: var(--text-muted);">Error loading products. Please make sure you are running a server to fetch the CSV file.</p>';
                });
        });
    </script>
</body>
</html>
